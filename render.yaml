services:
  - type: web
    name: poetic-brushstrokes
    env: static
    buildCommand: npm install && npm run build
    staticPublishPath: ./dist
    envVars:
      - key: NODE_VERSION
        value: 18
      - key: VITE_DOUBAO_API_KEY
        sync: false
      - key: VITE_DOUBAO_BASE_URL
        value: https://ark.cn-beijing.volces.com/api/v3
